name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Verify Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret VERCEL_TOKEN. Create one at https://vercel.com/account/tokens"
            exit 1
          fi

      - name: Verify project link
        run: |
          if [ ! -f .vercel/project.json ]; then
            echo "::error::Missing .vercel/project.json in the repository."
            exit 1
          fi
          echo "Linked Vercel project:"
          cat .vercel/project.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
